<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      font-family: Arial;
      background: #f4f6f8;
      text-align: center;
    }

    form {
      background: white;
      padding: 20px;
      width: 300px;
      margin: auto;
      border-radius: 10px;
    }

    input, textarea {
      width: 90%;
      margin: 10px;
      padding: 8px;
    }

    button {
      background: #28a745;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<h2>Create Event</h2>

<form id="form">
<input placeholder="Title" id="title"><br>
<input type="date" id="date"><br>
<input placeholder="Type" id="type"><br>
<textarea id="desc"></textarea><br>

<button>Create</button>
</form>

<script>
document.getElementById("form").onsubmit = async (e) => {
  e.preventDefault();

  await fetch("/events", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      title: title.value,
      date: date.value,
      type: type.value,
      description: desc.value
    })
  });

  alert("Created!");
  window.location.href = "/";
};
</script>

</body>
</html>
